services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: api
    env_file: apps/api/.env
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/app
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=s3_admin
      - S3_SECRET_KEY=s3_secret_key
      - S3_BUCKET=files
      - ENVIRONMENT=prod
      - DASHBOARD_BASE_URL=http://localhost
      - API_BASE_URL=http://localhost:3000
      - BETTER_AUTH_SECRET=change-this-to-a-secure-random-secret-in-production
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: dashboard
    env_file: apps/dashboard/.env
    ports:
      - "80:80"
    environment:
      - VITE_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    ports:
      - "8333:8333"
    environment:
      AWS_ACCESS_KEY_ID: s3_admin
      AWS_SECRET_ACCESS_KEY: s3_secret_key
      S3_BUCKET: files
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
