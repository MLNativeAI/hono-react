name: Scan Docker Images

on:
  schedule:
    # 05:00 UTC nightly
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  # Required to upload SARIF to the GitHub Security tab.
  security-events: write

jobs:
  scan:
    name: Scan ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: mlnative/hono-react-api
          - name: dashboard
            image: mlnative/hono-react-dashboard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Skip the leg gracefully if `latest` isn't published yet (e.g. pre-release repo).
      - name: Check image is published
        id: manifest
        continue-on-error: true
        run: docker manifest inspect docker.io/${{ matrix.image }}:latest > /dev/null

      - name: Run Trivy vulnerability scanner
        if: steps.manifest.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: docker.io/${{ matrix.image }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to GitHub Security tab
        if: steps.manifest.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: container-${{ matrix.name }}

      - name: Upload SARIF artifact
        if: steps.manifest.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-results.sarif
          retention-days: 14

      - name: Skip (image not published yet)
        if: steps.manifest.outcome != 'success'
        run: echo "::notice::docker.io/${{ matrix.image }}:latest not found; skipping scan."
