name: E2E Tests

on:
  workflow_call:
    inputs:
      api_base_url:
        required: true
        type: string
    secrets:
      api_key:
        required: true
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API base URL
        required: true
        type: string
        default: http://localhost:3000

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9

    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: bun install

    - name: Run E2E tests
      run: bun test src/
      working-directory: tests/e2e
      env:
        E2E_API_BASE_URL: ${{ inputs.api_base_url }}
        E2E_API_KEY: ${{ secrets.api_key }}
