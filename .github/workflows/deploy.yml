name: Deploy

on:
  workflow_call:
    inputs:
      application_id:
        required: true
        type: string
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      verify_url:
        required: false
        type: string
      expected_version:
        required: false
        type: string
    secrets:
      DOKPLOY_API_KEY:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Install httpie
        run: sudo apt-get install -y httpie

      - name: Update docker image in Dokploy
        run: |
          http --ignore-stdin POST https://app.dokploy.com/api/application.update \
            "x-api-key:${{ secrets.DOKPLOY_API_KEY }}" \
            --raw '{"applicationId": "${{ inputs.application_id }}", "dockerImage": "${{ inputs.image_name }}:${{ inputs.image_tag }}"}'

      - name: Deploy to Dokploy
        run: |
          http --ignore-stdin POST https://app.dokploy.com/api/application.deploy \
            "x-api-key:${{ secrets.DOKPLOY_API_KEY }}" \
            --raw '{"applicationId": "${{ inputs.application_id }}"}'

      - name: Verify deployment is live
        if: inputs.verify_url != '' && inputs.expected_version != ''
        run: |
          for i in $(seq 1 20); do
            VERSION=$(curl -sf "${{ inputs.verify_url }}" | jq -r '.version')
            if [ "$VERSION" = "${{ inputs.expected_version }}" ]; then
              echo "Deployed version $VERSION is live!"
              exit 0
            fi
            echo "Got $VERSION, retrying in 15s... ($i/20)"
            sleep 15
          done
          echo "Timed out waiting for version ${{ inputs.expected_version }}"
          exit 1
