name: Tests

on:
  workflow_call:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14

    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: bun install

    - name: Compile translations
      run: bun run paraglide:compile

    - name: Run unit tests
      run: bun run test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Postgres service container the integration suite migrates against.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Point the suite at the service container (host port mapped above).
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/app_test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14

    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: bun install

    - name: Run integration tests
      run: bun run test:integration
